{% extends "base.html" %}

{% block title %}Add Bus{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Add New Bus</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Bus Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="from_city" class="form-label">From City</label>
                        <input type="text" class="form-control" id="from_city" name="from_city" required>
                    </div>
                    <div class="mb-3">
                        <label for="to_city" class="form-label">To City</label>
                        <input type="text" class="form-control" id="to_city" name="to_city" required>
                    </div>
                    <div class="mb-3">
                        <label for="departure_time" class="form-label">Departure Time (YYYY-MM-DD HH:MM:SS)</label>
                        <input type="datetime-local" class="form-control" id="departure_time" name="departure_time" required>
                    </div>
                    <div class="mb-3">
                        <label for="arrival_time" class="form-label">Arrival Time (YYYY-MM-DD HH:MM:SS)</label>
                        <input type="datetime-local" class="form-control" id="arrival_time" name="arrival_time" required>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                    </div>
                    <div class="mb-3">
                        <label for="total_seats" class="form-label">Total Seats</label>
                        <input type="number" class="form-control" id="total_seats" name="total_seats" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Bus</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
